server:
  port: 8081

spring:
  application:
    name: inmobiliaria-service

    springdoc:
      swagger-ui:
        path: /swagger-ui.html
      api-docs:
        path: /v3/api-docs

  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/db_inmobiliaria}
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  liquibase:
    enabled: false

  eureka:
    client:
      service-url:
        defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
      register-with-eureka: true
      fetch-registry: true

      instance:
        prefer-ip-address: true

