server:
  port: 8081

spring:
  application:
    name: inmobiliaria-service # Identificador para Eureka
  datasource:
    url: jdbc:mysql://localhost:3306/db_inmobibliaria?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  liquibase:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/